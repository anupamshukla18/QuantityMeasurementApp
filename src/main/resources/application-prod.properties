# ===== MySQL Database (Production) =====
spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurementdb?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=anupam1813

# ===== JPA / Hibernate Settings =====
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== Logging Levels (Production) =====
logging.level.root=WARN
logging.level.com.apps=INFO

# ===== Swagger / OpenAPI =====
springdoc.swagger-ui.enabled=true

# ===== Actuator (Production - limited) =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never